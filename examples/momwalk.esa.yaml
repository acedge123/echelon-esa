spec_version: "0.2"

service:
  id: com.momwalk.brand-portal
  name: Mom Walk Brand Portal Services
  description: Approved search and insight capabilities derived from community, event, and local-business data.
  version: "1.0.0"
  owner: The Mom Walk Collective
  base_url: https://example.momwalk.com/api/v1
  status: experimental
  terms_url: https://example.momwalk.com/terms
  privacy_url: https://example.momwalk.com/privacy
  support_url: https://example.momwalk.com/support

capabilities:
  - id: momwalk.business.search
    version: "1.0.0"
    name: Search Local Businesses
    description: Search approved local-business records by geography, category, and proximity to a Mom Walk community.
    status: experimental

    interfaces:
      http:
        method: POST
        path: /businesses/search
        content_type: application/json
      mcp:
        derive_from: http
        tool_name: momwalk_business_search
        input_schema_ref: https://example.momwalk.com/schemas/business-search-request.json
        output_schema_ref: https://example.momwalk.com/schemas/business-search-response.json

    input_schema: https://example.momwalk.com/schemas/business-search-request.json
    output_schema: https://example.momwalk.com/schemas/business-search-response.json

    auth:
      methods:
        - type: api_key
          issuers: [https://keys.momwalk.com]
          scopes: [businesses:read]
        - type: oauth2
          issuers: [https://auth.momwalk.com]
          scopes: [businesses.read]

    payments:
      methods:
        - type: subscription_entitlement
        - type: x402
          network: base
          currency: USDC
          pay_to: "0xREPLACE_WITH_BASE_ADDRESS"

    pricing:
      model: hybrid
      components:
        - model: subscription
          plan_id: brand-portal
        - model: metered
          unit: request
          amount: "0.02"
          currency: USDC

    rate_limits:
      per_key: { requests: 20, period: minute }
      per_tenant: { requests: 2000, period: day }
      max_concurrency: 3

    sla:
      availability_target: "99.0%"
      latency_ms: { p50: 500, p95: 1800 }
      timeout_ms: 10000

    data:
      classification: aggregated-commercial
      pii: { request: false, response: false }
      retention: none
      freshness: weekly
      permitted_uses: [local-business-discovery, sponsor-planning]
      redistribution: restricted
      prohibited_uses: [unrestricted-redistribution, personal-profiling]
      source_rights_review_required: true

    idempotency:
      supported: true
      header: Idempotency-Key
      retention_hours: 24

    async:
      supported: false

    errors:
      - code: INVALID_GEOGRAPHY
        protocol_status: 400
        retryable: false
      - code: DATA_USE_RESTRICTED
        protocol_status: 403
        retryable: false
      - code: RATE_LIMITED
        protocol_status: 429
        retryable: true

    events: []

    deprecation:
      deprecated_on: null
      sunset_on: null
      successor_capability_id: null

discovery:
  openapi_url: https://example.momwalk.com/openapi.json
  docs_url: https://example.momwalk.com/docs
  registries:
    - name: Echelon
      optional: true

governance:
  contact: replace-with-product-owner
  legal_notice: Public discovery does not imply unrestricted access, reuse, or redistribution rights.